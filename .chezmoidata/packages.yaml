packages:
  darwin:
    brews:
      - 'antidote' # zsh plugin manager
      - 'ripgrep' # search tool
      - 'fzf' # fuzzy finder
      - 'fd' # find replacement
      - 'git' # version control
      - 'gh' # github cli
      - 'zoxide' # directory jump
      - 'tree' # directory listing
      - 'htop' # process viewer
      - 'git-delta' # git diff viewer
      - 'tree-sitter' # syntax highlighting
      - 'lesspipe' # less file viewer
      - 'docker-completion' # docker completion
      - 'node' # javascript runtime
      - 'ncdu' # disk usage
      - 'wget' # download tool
      - 'duf' # disk usage
      - 'starship' # prompt
      - 'veeso/termscp/termscp' # scp client
      - 'gnupg'
      - 'neovim'
      - 'uv' # python dependency manager
  linux:
    apts:
      - 'ripgrep' # search tool
      - 'fzf' # fuzzy finder
      - 'fd-find' # find replacement
      - 'git' # version control
      - 'zoxide' # directory jump
      - 'tree' # directory listing
      - 'htop' # process viewer
      - 'delta' # git diff viewer (git-delta on macOS)
      - 'ncdu' # disk usage
      - 'duf' # disk usage
      - 'gnupg' # gpg tools
      - 'lm-sensors' # temp sensors
      - 'nvme-cli' # nvme tools
      - 'hdparm' # HDD tools
      - 'iotop' # check real-time disk usage
      - 'powertop' # optimize power saving
      - 'smartmontools' # SMART data
    brews:
      - 'antidote' # zsh plugin manager
      - 'tealdeer' # tldr in rust
      - 'neovim' # text editor
      - 'starship' # prompt
      - 'gh' # github cli
      - 'dtop' # docker top
      - 'gnupg' # gpg tools
      - 'lazydocker' # docker tui
      - 'yazi' # file manager
      - 'uv' # python dependency manager

